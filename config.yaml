# first-look configuration
# AI tries new tools so you don't have to.

hn:
  poll_interval: 300  # seconds between HN API polls
  min_score: 5        # minimum HN score to consider
  max_age_hours: 24   # only look at posts from last N hours
  filters:
    - "github.com"
    - "gitlab.com"

environments:
  - name: ubuntu-22.04
    dockerfile: environments/ubuntu-22.04/Dockerfile
    timeout: 300  # max seconds for install attempt
  # Phase 2: add more environments
  # - name: ubuntu-24.04
  # - name: python-3.12-slim
  # - name: alpine-3.19
  # - name: node-20

llm:
  # Configured via environment variables:
  #   OPENAI_API_KEY (required)
  #   LLM_API_URL (default: https://api.openai.com/v1/chat/completions)
  #   LLM_MODEL (default: gpt-4o)
  max_tokens: 4096

output:
  reports_dir: reports
  format: markdown
